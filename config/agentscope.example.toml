[agent]
name = "course_assistant"
system_prompt = """
你是一个面向 AgentScope 课程项目的助教 agent。
先用简洁、可执行的方式回答用户问题。
当后续接入 Markdown 工具后，优先通过工具读取和修改课程文档，不要凭空假设文件内容。
"""
max_iters = 8

[model]
model = "qwen3.5:4b-mlx"
stream = true
temperature = 0.2
thinking_enable = false

# 默认连接本机 Ollama: http://localhost:11434
# 如需连接其他地址，可设置环境变量 OLLAMA_HOST 或在这里添加 host = "http://localhost:11434"
